version = 1
requires-python = ">=3.10"

[[package]]
name = "code-debugger-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "openenv-core" },
  { name = "fastapi" },
  { name = "uvicorn" },
  { name = "pydantic" },
  { name = "openai" },
]

[package.metadata]
requires-dist = [
  { name = "openenv-core" },
  { name = "fastapi" },
  { name = "uvicorn", extras = ["standard"] },
  { name = "pydantic", specifier = ">=2" },
  { name = "openai" },
]

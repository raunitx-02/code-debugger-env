name: code-debugger-env
version: "1.0.0"
description: >
  A real-world Python code debugging environment where AI agents identify
  bugs and provide corrected code. Covers runtime errors, logic bugs, and
  critical security vulnerabilities (SQL injection, weak hashing, unsafe eval).
  Graders execute fixed code in sandboxed subprocesses for fully deterministic,
  reproducible scoring. Ideal for training code-review and security-aware agents.
  Grading includes a "Code Smell Penalty" to discourage dangerous patterns.
author: raunit19
tags:
  - code-review
  - debugging
  - security
  - python
  - real-world
  - openenv
action_space:
  type: object
  description: "Agent submits bug line number, bug type classification, and complete fixed code"
  properties:
    bug_line:
      type: integer
      description: "1-indexed line number of the bug in the code snippet"
    bug_type:
      type: string
      enum: ["syntax", "logic", "runtime", "security"]
      description: "Category of the bug"
    fixed_code:
      type: string
      description: "Complete corrected Python code (entire snippet, not just the fix)"
    explanation:
      type: string
      description: "One-sentence explanation of the bug (optional)"
observation_space:
  type: object
  properties:
    code_snippet:
      type: string
      description: "Python code containing exactly one planted bug"
    task_description:
      type: string
      description: "What the function should do when correctly implemented"
    test_hint:
      type: string
      description: "Description of the test cases that will grade the fix"
    feedback:
      type: string
      description: "Grader feedback from the previous attempt (empty on first step)"
    attempt_number:
      type: integer
      description: "Current attempt number within this episode (1-3)"
    score_so_far:
      type: float
      description: "Best score achieved so far in this episode (0.0-1.0)"
    done:
      type: boolean
      description: "True when the episode has ended"
    reward:
      type: float
      description: "Score for the most recent step (0.0-1.0)"
reward:
  type: float
  min: 0.0
  max: 1.0
  description: >
    Composite score based on individual test pass rates with logic/location bonuses.
    Includes a 40% "Code Smell" penalty for using eval(), exec(), or hardcoded secrets.
tasks:
  - id: easy_01
    difficulty: easy
    description: "Fix off-by-one in list double calculator"
  - id: medium_01
    difficulty: medium
    description: "Fix infinite recursion in summing logic"
  - id: hard_01
    difficulty: hard
    description: "Fix mutable default argument in class constructor"
  - id: easy_02
    difficulty: easy
    description: "Fix IndexError in palindrome checker"
  - id: easy_03
    difficulty: easy
    description: "Fix assignment error in vowel counter"
  - id: medium_02
    difficulty: medium
    description: "Fix TypeError / float division in binary search"
  - id: medium_03
    difficulty: medium
    description: "Fix logic error in list flattener"
  - id: hard_02
    difficulty: hard
    description: "Fix SQL injection vulnerability"
  - id: hard_03
    difficulty: hard
    description: "Replace dangerous MD5 password hashing with SHA-256"
max_episode_steps: 3
inference_timeout: 1200
baseline_scores:
  easy_avg: 1.00
  medium_avg: 1.00
  hard_avg: 0.70
  overall_avg: 0.91
